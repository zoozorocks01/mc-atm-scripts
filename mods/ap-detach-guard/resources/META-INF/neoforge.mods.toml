[[mods]]
modId = "apdetachguard"
version = "1.1.0"
displayName = "AP Detach Guard"
description = '''Server-crash guards for AdvancedPeripherals. 1) Catches the NotAttachedException fired when a computer detaches while an RS Bridge craft job is pending (uncaught, it crashes the whole server tick). 2) Null-guards RSApi.getCraftingTasks against poisoned craft jobs whose RS task reference was invalidated (uncaught, every bridge status call NPEs and craft jobs die falsely). Remove once fixed upstream.'''

[[dependencies.apdetachguard]]
modId = "advancedperipherals"
type = "required"
range = "[0.7,)"
ordering = "NONE"
side = "BOTH"

[[mixins]]
config = "apdetachguard.mixins.json"
